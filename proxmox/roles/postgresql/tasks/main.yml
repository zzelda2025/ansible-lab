---
- name: Cài PostgreSQL
  apt:
    name:
      - postgresql
      - postgresql-contrib
      - python3-psycopg2
    state: present
    update_cache: true
  # Thêm dòng này để gọi Handler khởi động sau khi cài xong
  notify: Restart PostgreSQL

- name: Tạo database user
  shell: |
    sudo -u postgres psql -c "SELECT 1 FROM pg_roles WHERE rolname='{{ db_user }}'" | grep -q 1 || \
    sudo -u postgres psql -c "CREATE USER {{ db_user }} WITH PASSWORD '{{ db_password }}';"
  changed_when: false
  # THÊM DÒNG NÀY: Bỏ qua task nếu đang chạy Dry Run
  when: not ansible_check_mode

- name: Tạo database
  shell: |
    sudo -u postgres psql -c "SELECT 1 FROM pg_database WHERE datname='{{ db_name }}'" | grep -q 1 || \
    sudo -u postgres psql -c "CREATE DATABASE {{ db_name }} OWNER {{ db_user }};"
  changed_when: false
  # THÊM DÒNG NÀY: Bỏ qua task nếu đang chạy Dry Run
  when: not ansible_check_mode

- name: Cấu hình PostgreSQL listen trên tất cả interface
  lineinfile:
    path: /etc/postgresql/{{ pg_version }}/main/postgresql.conf
    regexp: "#listen_addresses = 'localhost'"
    line: "listen_addresses = '*'"
  notify: Restart PostgreSQL
  # Bỏ qua task khi đang chạy thử
  when: not ansible_check_mode
  # Ép Ansible không kiểm tra file ảo khi ở chế độ Dry Run
  check_mode: no

- name: Cho phép kết nối từ WireGuard subnet
  lineinfile:
    path: /etc/postgresql/{{ pg_version }}/main/pg_hba.conf
    line: "host {{ db_name }} {{ db_user }} 10.10.10.1/32 md5"
    create: false
  notify: Restart PostgreSQL
  # Bỏ qua task khi đang chạy thử
  when: not ansible_check_mode
  # Ép Ansible không kiểm tra file ảo khi ở chế độ Dry Run
  check_mode: no
