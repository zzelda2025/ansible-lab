text: |
            {% if notify_state == 'waiting' %}
            ⏳ <b>YÊU CẦU PHÊ DUYỆT CÀI ĐẶT</b>
            Tên luồng: {{ awx_workflow_job_name | default('AWX Workflow') }}
            Trạng thái: Đang tạm dừng chờ duyệt (Dry Run hoàn tất).
            🔗 <a href="https://awx.vinhthai.io.vn/#/jobs/workflow/{{ awx_workflow_job_id | default('1') }}/output">Bấm vào đây để mở AWX và phê duyệt</a>
            
            {% elif notify_state == 'success' %}
            ✅ <b>CÀI ĐẶT THÀNH CÔNG</b>
            Tên luồng: {{ awx_workflow_job_name | default('AWX Workflow') }}
            Trạng thái: Playbook đã chạy xong! Không có lỗi (Failed = 0). 🚀
            📊 <a href="https://awx.vinhthai.io.vn/#/jobs/playbook/{{ install_job_id | default(awx_workflow_job_id) }}/output">Bấm vào đây để xem chi tiết log cài đặt</a>
            
            {% elif notify_state == 'failed' %}
            ❌ <b>CÀI ĐẶT THẤT BẠI</b>
            Tên luồng: {{ awx_workflow_job_name | default('AWX Workflow') }}
            Trạng thái: Đã có lỗi xảy ra trong quá trình cấu hình Ansible! ⚠️
            🔍 <a href="https://awx.vinhthai.io.vn/#/jobs/workflow/{{ awx_workflow_job_id | default('1') }}/output">Bấm vào đây để kiểm tra nguyên nhân lỗi</a>
            
            {% else %}
            ℹ️ <b>THÔNG BÁO TỪ AWX</b>
            Tên luồng: {{ awx_workflow_job_name | default('AWX Workflow') }}
            Trạng thái: Luồng đang chạy (Chưa xác định trạng thái cụ thể).
            {% endif %}
